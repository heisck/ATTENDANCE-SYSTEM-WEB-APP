worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;

  upstream attendance_app {
    zone attendance_app 64k;
    least_conn;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;
    keepalive 128;
    server app-1:3000 resolve max_fails=3 fail_timeout=10s;
    server app-2:3000 resolve max_fails=3 fail_timeout=10s;
    server app-3:3000 resolve max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;
    server_name _;

    location = /nginx-health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass http://attendance_app;
    }
  }
}
